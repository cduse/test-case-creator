name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: false
        default: ''

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Run Expo Prebuild (generate Android project)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_DOTENV: 1

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Rename APK with version info
        run: |
          VERSION="${{ github.event.inputs.version || github.sha }}"
          SHORT="${VERSION:0:8}"
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk "release/TestCaseCreator-${SHORT}.apk"
          echo "APK_PATH=release/TestCaseCreator-${SHORT}.apk" >> $GITHUB_ENV
          echo "APK_NAME=TestCaseCreator-${SHORT}.apk" >> $GITHUB_ENV

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: TestCaseCreator-APK
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Create GitHub Release (on version tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_PATH }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Test Case Creator ${{ github.ref_name }}

            ### Install
            1. Download `${{ env.APK_NAME }}` below
            2. Transfer to your Android device
            3. Enable "Install from unknown sources" in device settings
            4. Open the file to install

            ### First time setup
            Open the app → tap ⚙️ Settings → enter your OpenAI API key
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
