name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: false
        default: ''

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Run Expo Prebuild (generate Android project)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_DOTENV: 1

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Generate release signing keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/release.keystore \
            -alias testcasecreator \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=TestCaseCreator, OU=Dev, O=Dev, L=ZA, S=ZA, C=ZA" \
            -storepass testcase123 \
            -keypass testcase123 \
            -noprompt

      - name: Inject release signing config into build.gradle
        run: |
          cat >> android/app/build.gradle << 'GRADLE'

          android.signingConfigs {
              release {
                  storeFile file('release.keystore')
                  storePassword 'testcase123'
                  keyAlias 'testcasecreator'
                  keyPassword 'testcase123'
              }
          }
          android.buildTypes.release {
              signingConfig android.signingConfigs.release
          }
          GRADLE

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Rename APK with version info
        run: |
          VERSION="${{ github.event.inputs.version || github.sha }}"
          SHORT="${VERSION:0:8}"
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-release.apk "release/TestCaseCreator-${SHORT}.apk"
          echo "APK_PATH=release/TestCaseCreator-${SHORT}.apk" >> $GITHUB_ENV
          echo "APK_NAME=TestCaseCreator-${SHORT}.apk" >> $GITHUB_ENV
          echo "RELEASE_TAG=build-${SHORT}" >> $GITHUB_ENV

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: TestCaseCreator-APK
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Delete existing release if it exists
        run: |
          gh release delete "${{ env.RELEASE_TAG }}" --yes || true
          git push origin --delete "refs/tags/${{ env.RELEASE_TAG }}" || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Build ${{ env.RELEASE_TAG }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: ${{ env.APK_PATH }}
          body: |
            ## Test Case Creator — ${{ env.APK_NAME }}

            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`

            ### Install
            1. Download `${{ env.APK_NAME }}` below
            2. Transfer to your Android device
            3. Enable "Install from unknown sources" in device settings
            4. Open the file to install

            ### First time setup
            Open the app → go to Settings → enter your OpenAI API key
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
